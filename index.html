<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PUSD — Stablecoin Protocol · OP_NET Testnet</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist+Mono:wght@300;400;500;600&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}

:root{
  /* palette — warm off-white + deep ink */
  --bg:          #f7f5f0;
  --bg2:         #efecea;
  --surface:     #ffffff;
  --surface2:    #f4f2ed;
  --border:      #e4e0d8;
  --border2:     #d4cfc5;
  --muted:       #9e9a92;
  --soft:        #6e6a62;
  --body:        #3a3630;
  --head:        #1a1714;

  /* accents */
  --blue:        #1a56db;
  --blue-lt:     rgba(26,86,219,.08);
  --blue-bd:     rgba(26,86,219,.18);
  --green:       #0a7c5c;
  --green-lt:    rgba(10,124,92,.08);
  --green-bd:    rgba(10,124,92,.2);
  --red:         #c53030;
  --red-lt:      rgba(197,48,48,.07);
  --amber:       #b45309;
  --amber-lt:    rgba(180,83,9,.07);
  --amber-bd:    rgba(180,83,9,.2);

  /* testnet */
  --test:        #7c3aed;
  --test-lt:     rgba(124,58,237,.07);
  --test-bd:     rgba(124,58,237,.2);

  --serif:  'Instrument Serif', Georgia, serif;
  --sans:   'Geist', system-ui, sans-serif;
  --mono:   'Geist Mono', monospace;
  --r: 12px;
  --r2: 18px;
  --shadow: 0 1px 3px rgba(0,0,0,.06), 0 4px 16px rgba(0,0,0,.04);
  --shadow2: 0 2px 8px rgba(0,0,0,.08), 0 8px 32px rgba(0,0,0,.06);
}

html{height:100%;}
body{
  background:var(--bg);
  color:var(--body);
  font-family:var(--sans);
  font-size:14px;
  line-height:1.5;
  min-height:100vh;
}

/* subtle paper texture via shadow lines */
body::before{
  content:'';
  position:fixed;inset:0;
  background:
    radial-gradient(ellipse 80% 60% at 15% 10%, rgba(26,86,219,.04) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 85% 90%, rgba(10,124,92,.04) 0%, transparent 60%);
  pointer-events:none;z-index:0;
}

/* ─── TOPBAR ─── */
header{
  position:sticky;top:0;z-index:200;
  background:rgba(247,245,240,.9);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  height:58px;
  display:flex;align-items:center;
  padding:0 28px;
  gap:24px;
}

.logo{
  display:flex;align-items:center;gap:9px;
  font-family:var(--serif);
  font-size:20px;
  color:var(--head);
  letter-spacing:-.3px;
  flex-shrink:0;
}

.logo-mark{
  width:30px;height:30px;border-radius:8px;
  background:var(--head);
  display:flex;align-items:center;justify-content:center;
  color:#f7f5f0;
  font-family:var(--mono);
  font-size:13px;font-weight:600;
  letter-spacing:-1px;
}

.nav{
  display:flex;gap:1px;
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:9px;
  padding:3px;
}

.nav-item{
  padding:5px 14px;
  border-radius:6px;
  font-size:13px;font-weight:500;
  color:var(--muted);
  cursor:pointer;
  transition:all .15s;
  white-space:nowrap;
}
.nav-item:hover{color:var(--body);}
.nav-item.active{background:var(--surface);color:var(--head);box-shadow:var(--shadow);font-weight:600;}

.header-right{margin-left:auto;display:flex;align-items:center;gap:10px;}

.testnet-pill{
  display:flex;align-items:center;gap:6px;
  padding:5px 11px;border-radius:20px;
  font-size:11px;font-weight:600;letter-spacing:.3px;
  background:var(--test-lt);border:1px solid var(--test-bd);color:var(--test);
}

.testnet-pulse{
  width:6px;height:6px;border-radius:50%;
  background:var(--test);
  animation:tpulse 2s infinite;
}
@keyframes tpulse{0%,100%{opacity:1;}50%{opacity:.35;}}

.btn-connect{
  display:flex;align-items:center;gap:7px;
  padding:8px 16px;border-radius:9px;
  font-family:var(--sans);font-size:13px;font-weight:600;
  background:var(--head);color:var(--bg);
  border:none;cursor:pointer;
  transition:all .18s;
  white-space:nowrap;
}
.btn-connect:hover{background:#2d2925;transform:translateY(-1px);box-shadow:0 4px 14px rgba(0,0,0,.18);}
.btn-connect.connected{
  background:var(--surface);
  color:var(--body);
  border:1px solid var(--border2);
  box-shadow:var(--shadow);
}
.btn-connect.connected:hover{border-color:var(--border2);background:var(--bg2);}

.wallet-indicator{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 0 2px var(--green-lt);}

/* ─── PAGE WRAPPER ─── */
.page{
  position:relative;z-index:1;
  max-width:1060px;
  margin:0 auto;
  padding:36px 20px 80px;
}

/* ─── SECTION VISIBILITY ─── */
.section{display:none;}
.section.active{display:block;}

/* ─── HERO ─── */
.hero{
  margin-bottom:40px;
}

.hero-label{
  display:inline-flex;align-items:center;gap:7px;
  font-size:11px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;
  color:var(--soft);margin-bottom:14px;
}
.hero-label::before{content:'';display:inline-block;width:20px;height:1px;background:var(--border2);}

.hero-heading{
  font-family:var(--serif);
  font-size:42px;line-height:1.05;
  color:var(--head);
  letter-spacing:-.5px;
  margin-bottom:12px;
}
.hero-heading em{font-style:italic;color:var(--blue);}

.hero-sub{
  font-size:15px;color:var(--soft);
  max-width:500px;line-height:1.65;
}

/* ─── STATS BAR ─── */
.stats-bar{
  display:grid;grid-template-columns:repeat(4,1fr);
  border:1px solid var(--border);
  border-radius:var(--r2);
  overflow:hidden;
  background:var(--border);
  gap:1px;
  margin-bottom:36px;
  box-shadow:var(--shadow);
}

.stat-cell{
  background:var(--surface);
  padding:18px 22px;
}

.stat-lbl{font-size:11px;font-weight:500;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
.stat-val{font-family:var(--mono);font-size:22px;font-weight:600;color:var(--head);letter-spacing:-1px;line-height:1;}
.stat-val.blue{color:var(--blue);}
.stat-val.green{color:var(--green);}
.stat-chg{font-size:11px;color:var(--muted);margin-top:4px;}
.stat-chg.up{color:var(--green);}

/* ─── MAIN LAYOUT ─── */
.main-grid{
  display:grid;
  grid-template-columns:1fr 340px;
  gap:20px;
  align-items:start;
}

/* ─── CARD ─── */
.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r2);
  overflow:hidden;
  box-shadow:var(--shadow);
}

/* ─── TAB BAR ─── */
.tab-bar{
  display:flex;
  border-bottom:1px solid var(--border);
  padding:0 4px;
  background:var(--surface);
}

.tab{
  flex:1;
  padding:14px 10px;
  font-size:13px;font-weight:500;
  color:var(--muted);cursor:pointer;
  transition:all .15s;
  border-bottom:2px solid transparent;
  text-align:center;
  white-space:nowrap;
}
.tab:hover{color:var(--body);}
.tab.active{color:var(--blue);border-bottom-color:var(--blue);font-weight:600;}

/* ─── FORM AREA ─── */
.form-area{padding:26px;}

/* step badge */
.step-badge{
  display:inline-flex;align-items:center;gap:8px;
  font-size:11px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;
  color:var(--muted);margin-bottom:14px;
}

.step-num{
  width:20px;height:20px;border-radius:50%;
  background:var(--bg2);border:1px solid var(--border2);
  display:inline-flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:700;color:var(--soft);
  flex-shrink:0;
}

/* ─── INPUT FIELD ─── */
.field-wrap{margin-bottom:18px;}

.field-top{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:7px;
}
.field-label{font-size:12px;font-weight:600;color:var(--soft);letter-spacing:.2px;}
.field-balance{
  font-family:var(--mono);font-size:12px;color:var(--muted);
  cursor:pointer;transition:color .12s;
}
.field-balance:hover{color:var(--blue);}

.input-row{
  display:flex;align-items:center;
  background:var(--bg2);
  border:1.5px solid var(--border);
  border-radius:var(--r);
  overflow:hidden;
  transition:border-color .15s,box-shadow .15s;
}
.input-row:focus-within{
  border-color:var(--blue);
  box-shadow:0 0 0 3px var(--blue-lt);
  background:var(--surface);
}

.token-badge{
  display:flex;align-items:center;gap:7px;
  padding:12px 14px;
  border-right:1.5px solid var(--border);
  font-size:13px;font-weight:600;color:var(--head);
  background:var(--surface);
  white-space:nowrap;
  flex-shrink:0;
}

.token-icon{
  width:24px;height:24px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;
  flex-shrink:0;
}

.num-input{
  flex:1;
  background:none;border:none;outline:none;
  font-family:var(--mono);font-size:20px;font-weight:500;
  color:var(--head);
  padding:12px 14px;
  width:100%;
  -moz-appearance:textfield;
}
.num-input::-webkit-outer-spin-button,
.num-input::-webkit-inner-spin-button{-webkit-appearance:none;}
.num-input::placeholder{color:var(--border2);}

.btn-max{
  padding:0 14px;
  font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:.5px;
  color:var(--blue);cursor:pointer;
  background:none;border:none;
  border-left:1.5px solid var(--border);
  height:100%;transition:background .12s;
  white-space:nowrap;
}
.btn-max:hover{background:var(--blue-lt);}

.input-sub{
  font-family:var(--mono);font-size:11px;color:var(--muted);
  margin-top:5px;padding-left:2px;
}

/* ─── QUICK % BUTTONS ─── */
.pct-row{display:flex;gap:6px;margin-bottom:20px;}

.pct{
  flex:1;padding:6px 4px;
  border-radius:7px;
  border:1px solid var(--border);
  background:var(--bg2);
  font-family:var(--mono);font-size:11px;font-weight:600;
  color:var(--muted);cursor:pointer;
  transition:all .12s;text-align:center;
}
.pct:hover{border-color:var(--blue);color:var(--blue);}
.pct.on{background:var(--blue-lt);border-color:var(--blue-bd);color:var(--blue);}

/* ─── DIVIDER ARROW ─── */
.arrow-div{
  display:flex;align-items:center;justify-content:center;
  margin:4px 0 16px;
}
.arrow-circle{
  width:32px;height:32px;border-radius:50%;
  background:var(--bg2);border:1.5px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-size:14px;color:var(--muted);
}

/* ─── SUMMARY TABLE ─── */
.summary{
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:var(--r);
  overflow:hidden;
  margin-bottom:20px;
}

.sumrow{
  display:flex;justify-content:space-between;align-items:center;
  padding:10px 14px;
  border-bottom:1px solid var(--border);
  font-size:13px;
}
.sumrow:last-child{border-bottom:none;}
.sumrow.hl{background:rgba(26,86,219,.03);}
.sk{color:var(--muted);}
.sv{font-family:var(--mono);font-weight:600;color:var(--head);}
.sv.blue{color:var(--blue);}
.sv.green{color:var(--green);}
.sv.amber{color:var(--amber);}

/* ─── ALERT BOX ─── */
.alert{
  display:flex;align-items:flex-start;gap:9px;
  padding:11px 13px;border-radius:9px;
  font-size:12px;line-height:1.6;
  margin-bottom:16px;
}
.alert.info{background:var(--blue-lt);border:1px solid var(--blue-bd);color:#1a3a8f;}
.alert.warn{background:var(--amber-lt);border:1px solid var(--amber-bd);color:var(--amber);}
.alert.test{background:var(--test-lt);border:1px solid var(--test-bd);color:var(--test);}
.alert-icon{font-size:14px;flex-shrink:0;margin-top:1px;}

/* ─── ACTION BUTTON ─── */
.action-btn{
  width:100%;
  padding:15px;
  border-radius:11px;
  font-family:var(--sans);font-size:14px;font-weight:600;
  letter-spacing:-.1px;
  cursor:pointer;border:none;
  transition:all .18s;
  position:relative;overflow:hidden;
}

.action-btn.primary{
  background:var(--head);color:var(--bg);
}
.action-btn.primary:hover{background:#2d2925;transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,0,0,.2);}

.action-btn.mint-style{
  background:var(--blue);color:#fff;
}
.action-btn.mint-style:hover{background:#1545b8;transform:translateY(-1px);box-shadow:0 6px 20px rgba(26,86,219,.35);}

.action-btn.stake-style{
  background:var(--green);color:#fff;
}
.action-btn.stake-style:hover{background:#085c44;transform:translateY(-1px);box-shadow:0 6px 20px rgba(10,124,92,.35);}

.action-btn.secondary{
  background:var(--bg2);
  border:1px solid var(--border2);
  color:var(--body);
}
.action-btn.secondary:hover{border-color:var(--border2);background:var(--bg);}

.action-btn:disabled{opacity:.38;cursor:not-allowed;transform:none!important;box-shadow:none!important;}

/* shimmer */
.action-btn.primary::after,.action-btn.mint-style::after,.action-btn.stake-style::after{
  content:'';
  position:absolute;inset:0;
  background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,.08) 50%,transparent 100%);
  transform:translateX(-100%);
  animation:shimmer 3.5s 1.5s infinite;
}
@keyframes shimmer{0%{transform:translateX(-100%);}100%{transform:translateX(200%);}}

/* ─── RIGHT PANEL ─── */
.side-panel{
  display:flex;flex-direction:column;gap:14px;
}

/* ─── POSITION BOX ─── */
.pos-box{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r2);
  overflow:hidden;
  box-shadow:var(--shadow);
}

.pos-header{
  padding:18px 20px 14px;
  border-bottom:1px solid var(--border);
}

.pos-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:6px;}

.pos-value{
  font-family:var(--serif);
  font-size:32px;color:var(--head);
  letter-spacing:-.5px;
  line-height:1;
}

.pos-value small{font-size:16px;color:var(--muted);font-family:var(--mono);}

.pos-body{padding:16px 20px;}

.pos-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:9px 0;border-bottom:1px solid var(--bg2);
  font-size:13px;
}
.pos-row:last-child{border-bottom:none;}
.pk{color:var(--muted);}
.pv{font-family:var(--mono);font-weight:600;color:var(--body);}
.pv.green{color:var(--green);}
.pv.blue{color:var(--blue);}

/* health bar */
.health-wrap{
  margin:14px 0 6px;
  background:var(--bg2);border:1px solid var(--border);
  border-radius:9px;padding:12px 14px;
}
.health-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:8px;}
.health-track{background:var(--border);border-radius:3px;height:5px;overflow:hidden;}
.health-fill{height:100%;border-radius:3px;transition:width .6s ease,background .4s;}
.health-numbers{display:flex;justify-content:space-between;font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:5px;}

/* ─── PROTOCOL INFO BOX ─── */
.info-box{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r2);
  overflow:hidden;
  box-shadow:var(--shadow);
}

.info-box-title{
  font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);
  padding:14px 18px 10px;border-bottom:1px solid var(--bg2);
}

.info-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:9px 18px;
  border-bottom:1px solid var(--bg2);
  font-size:13px;
}
.info-row:last-child{border-bottom:none;}
.ik{color:var(--muted);}
.iv{font-family:var(--mono);font-weight:600;color:var(--body);}
.iv.green{color:var(--green);}
.iv.blue{color:var(--blue);}

/* ─── WALLET OVERLAY ─── */
.overlay{
  position:fixed;inset:0;z-index:900;
  background:rgba(26,23,20,.55);
  backdrop-filter:blur(14px);
  display:none;align-items:center;justify-content:center;
}
.overlay.open{display:flex;}

.modal{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:20px;
  width:420px;max-width:95vw;
  box-shadow:0 24px 80px rgba(0,0,0,.15);
  overflow:hidden;
  animation:slideUp .28s cubic-bezier(.34,1.4,.64,1);
}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)scale(.97);}to{opacity:1;transform:translateY(0)scale(1);}}

.modal-header{
  padding:22px 24px 18px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:flex-start;justify-content:space-between;
}

.modal-title{font-family:var(--serif);font-size:20px;color:var(--head);margin-bottom:4px;}
.modal-sub{font-size:13px;color:var(--muted);line-height:1.5;}

.modal-close{
  background:none;border:none;
  font-size:18px;color:var(--muted);cursor:pointer;
  line-height:1;padding:2px;transition:color .12s;
}
.modal-close:hover{color:var(--red);}

.modal-body{padding:22px 24px 26px;}

/* spinner ring */
.ring-wrap{
  width:72px;height:72px;
  margin:0 auto 18px;
  position:relative;display:flex;align-items:center;justify-content:center;
}
.ring{
  position:absolute;inset:0;border-radius:50%;
  border:1.5px solid rgba(26,86,219,.15);
  animation:ringPop 2s ease-out infinite;
}
.ring:nth-child(2){inset:-10px;animation-delay:.5s;}
.ring:nth-child(3){inset:-20px;animation-delay:1s;}
@keyframes ringPop{0%{opacity:.8;transform:scale(1);}100%{opacity:0;transform:scale(1.3);}}

.ring-core{
  width:56px;height:56px;border-radius:14px;
  background:var(--bg2);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-size:26px;position:relative;z-index:1;
}

.modal-waiting{
  text-align:center;
  font-size:12px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;
  color:var(--muted);margin-bottom:18px;
  display:flex;align-items:center;justify-content:center;gap:6px;
}

.dot{
  width:4px;height:4px;border-radius:50%;background:var(--blue);
  animation:dotAnim 1.4s ease-in-out infinite;
}
.dot:nth-child(2){animation-delay:.18s;}
.dot:nth-child(3){animation-delay:.36s;}
@keyframes dotAnim{0%,80%,100%{transform:translateY(0);opacity:.3;}40%{transform:translateY(-4px);opacity:1;}}

.tx-summary{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--r);overflow:hidden;margin-bottom:18px;
}
.tx-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:10px 14px;border-bottom:1px solid var(--border);
  font-size:13px;
}
.tx-row:last-child{border-bottom:none;}
.tk{color:var(--muted);}
.tv{font-family:var(--mono);font-weight:600;color:var(--head);}
.tv.blue{color:var(--blue);}
.tv.green{color:var(--green);}
.tv.amber{color:var(--amber);}

.btn-cancel{
  width:100%;padding:12px;border-radius:9px;
  background:none;border:1px solid var(--border2);
  font-family:var(--sans);font-size:13px;font-weight:600;
  color:var(--muted);cursor:pointer;transition:all .15s;
}
.btn-cancel:hover{border-color:var(--red);color:var(--red);}

/* ─── TOAST ─── */
#toasts{
  position:fixed;bottom:22px;right:22px;z-index:9999;
  display:flex;flex-direction:column;gap:8px;pointer-events:none;
}
.toast{
  display:flex;align-items:flex-start;gap:10px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:10px;
  padding:12px 16px;
  min-width:260px;max-width:340px;
  font-size:13px;line-height:1.45;
  box-shadow:0 8px 28px rgba(0,0,0,.12);
  animation:toastIn .3s ease;
  pointer-events:all;
  border-left-width:3px;
}
